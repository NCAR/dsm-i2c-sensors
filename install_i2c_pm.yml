---
- name: Install i2c_sensors and power_monitor on Raspberry Pi
  hosts: DSMs
  become: true
  vars:
    # The repo is (or may become) private, so it is cloned over SSH using the
    # daq user's key.  Override git_repo_url_for_i2c_sensors / i2c_install_dir
    # on the command line to change these defaults.
    git_repo_url_for_i2c_sensors: "git@github.com:NCAR/dsm-i2c-sensors.git"
    i2c_repo: "{{ git_repo_url_for_i2c_sensors }}"
    install_dir: "{{ i2c_install_dir | default('/opt') }}"

    # Match the dsm-platform virtual-environment convention (see
    # dsm-platform/ansible/python-virtualenv.yml and
    # scripts/checkout-projects.sh:setup_venv): a single shared virtualenv in
    # the daq user's home, created with `virtualenv` (the python3-virtualenv
    # package) and deliberately WITHOUT --system-site-packages, owned by daq.
    venv_user: "daq"
    venv_dir: "/home/{{ venv_user }}/venv"

    # Groups the service user needs to reach the sensor hardware:
    #   i2c     - native /dev/i2c-* buses (smbus2)
    #   dialout - USB/serial devices (/dev/ttyUSB*, /dev/ttyACM*) and, via the
    #             FTDI udev rule below, raw FTDI USB access (pyftdi/libusb)
    device_groups:
      - i2c
      - dialout

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - git
          - python3
          - python3-pip
          - pipenv
          - python3-virtualenv
          - i2c-tools
        state: present

    - name: Ensure SSH directory exists for {{ venv_user }}
      ansible.builtin.file:
        path: "/home/{{ venv_user }}/.ssh"
        state: directory
        owner: "{{ venv_user }}"
        group: "{{ venv_user }}"
        mode: "0700"

    - name: Copy SSH key for i2c_sensors repo access
      ansible.builtin.copy:
        src: /ansible/local/.ssh/id_ed25519_i2c
        dest: "/home/{{ venv_user }}/.ssh/id_ed25519_i2c"
        owner: "{{ venv_user }}"
        group: "{{ venv_user }}"
        mode: "0600"

    - name: Configure SSH for github.com access
      ansible.builtin.copy:
        dest: "/home/{{ venv_user }}/.ssh/config"
        content: |
          Host github.com
            HostName github.com
            User git
            IdentityFile ~/.ssh/id_ed25519_i2c
            StrictHostKeyChecking no
        owner: "{{ venv_user }}"
        group: "{{ venv_user }}"
        mode: "0600"

    - name: Adjust ownership of i2c_sensors repo folder
      ansible.builtin.file:
        path: "{{ install_dir }}/i2c_sensors"
        owner: "{{ venv_user }}"
        group: "{{ venv_user }}"
        recurse: true

    - name: Clone dsm-i2c-sensors repo over SSH as {{ venv_user }}
      become: true
      become_user: "{{ venv_user }}"
      ansible.builtin.git:
        repo: "{{ i2c_repo }}"
        dest: "{{ install_dir }}/i2c_sensors"
        version: HEAD
        force: true
        accept_hostkey: yes

    - name: Create shared virtualenv (no system-site-packages) as {{ venv_user }}
      become: true
      become_user: "{{ venv_user }}"
      ansible.builtin.command:
        cmd: "virtualenv {{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/activate"

    - name: Install i2c_sensors requirements into the virtualenv
      become: true
      become_user: "{{ venv_user }}"
      ansible.builtin.pip:
        requirements: "{{ install_dir }}/i2c_sensors/requirements.txt"
        virtualenv: "{{ venv_dir }}"

    - name: Install i2c_sensors package into the virtualenv (editable)
      become: true
      become_user: "{{ venv_user }}"
      ansible.builtin.pip:
        name: "{{ install_dir }}/i2c_sensors"
        virtualenv: "{{ venv_dir }}"
        editable: true

    - name: Enable I2C in config.txt
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        regexp: "^dtparam=i2c_arm="
        line: "dtparam=i2c_arm=on"
        create: true
        mode: "0755"

    - name: Ensure i2c-dev module is loaded
      community.general.modprobe:
        name: i2c-dev
        state: present

    - name: Add device-access groups to {{ venv_user }}
      ansible.builtin.user:
        name: "{{ venv_user }}"
        groups: "{{ device_groups }}"
        append: true

    - name: Install udev rule for FTDI USB devices (pyftdi/libusb)
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/60-ftdi-i2c-sensors.rules
        content: |
          # Allow the dialout group to access FTDI USB devices via libusb so
          # the power-monitor service (running as {{ venv_user }}) can drive
          # FTDI I2C adapters with pyftdi.
          SUBSYSTEM=="usb", ATTR{idVendor}=="0403", GROUP="dialout", MODE="0664"
        mode: "0644"
      notify: Reload udev rules

    - name: Copy power-monitor config file
      ansible.builtin.copy:
        src: "{{ install_dir }}/i2c_sensors/power_monitor/power_monitor.config"
        dest: "{{ install_dir }}/i2c_sensors/power-monitor.config"
        remote_src: true
        mode: "0644"

    - name: Create /var/lib/node_exporter folder if doesn't exists
      ansible.builtin.file:
        path: /var/lib/node_exporter
        state: directory
        owner: "{{ venv_user }}"
        group: "{{ venv_user }}"
        mode: "0755"

    - name: Create systemd service for power_monitor
      ansible.builtin.copy:
        dest: /etc/systemd/system/power-monitor.service
        content: |
          [Unit]
          Description=power-monitor service
          After=network.target

          [Service]
          # power-monitor is the console-script entry point installed into the
          # shared virtualenv (see pyproject.toml [project.scripts]).  It runs
          # as {{ venv_user }}, which is in the i2c and dialout groups so it can
          # open native I2C, serial, and FTDI-over-USB devices.
          ExecStart={{ venv_dir }}/bin/power-monitor --config {{ install_dir }}/i2c_sensors/power-monitor.config --out /var/lib/node_exporter/pm.prom
          Environment="PATH={{ venv_dir }}/bin"
          WorkingDirectory={{ install_dir }}/i2c_sensors
          Restart=always
          User={{ venv_user }}

          [Install]
          WantedBy=multi-user.target
        mode: "0644"

    - name: Check if prometheus-node-exporter.service is installed
      ansible.builtin.command:
        cmd: systemctl list-unit-files prometheus-node-exporter.service --no-legend --no-pager
      register: node_exporter_service
      failed_when: false
      changed_when: false

    - name: Ensure prometheus-node-exporter ARGS includes textfile collector directory
      ansible.builtin.shell: |
        envfile=/etc/default/prometheus-node-exporter
        if grep -q -- '^ARGS=.*--collector.textfile.directory=/var/lib/node_exporter' "$envfile" 2>/dev/null; then
          exit 0
        fi
        if grep -q '^ARGS=' "$envfile" 2>/dev/null; then
          sed -i 's|^ARGS=\(.*\)$|ARGS=\1 --collector.textfile.directory=/var/lib/node_exporter|' "$envfile"
        else
          mkdir -p "$(dirname "$envfile")"
          echo 'ARGS=--collector.textfile.directory=/var/lib/node_exporter' >> "$envfile"
        fi

      args:
        executable: /bin/bash
      register: node_exporter_args
      when: node_exporter_service.rc == 0

    - name: Restart prometheus-node-exporter to reload updated config
      ansible.builtin.systemd:
        name: prometheus-node-exporter
        state: restarted
      when:
        - node_exporter_service.rc == 0
        - node_exporter_args.changed

    - name: Enable and start services
      ansible.builtin.systemd:
        name: power-monitor
        enabled: true
        state: started
        daemon_reload: true

  handlers:
    - name: Reload udev rules
      ansible.builtin.command:
        cmd: udevadm control --reload-rules
      changed_when: false
